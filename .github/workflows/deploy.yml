name: Build site to /docs

# GitHub Pages is configured as "Deploy from a branch" (Source: this branch,
# Folder: /docs). Pages serves files as-is, so the *built* site must live in
# /docs. This workflow rebuilds it on every push and commits it back, so the
# published site always matches the source. (Pushes made with GITHUB_TOKEN do
# not retrigger workflows, so this never loops.)

on:
  push:
    branches:
      - main
      - claude/lucid-goodall-z4fbR
    paths-ignore:
      - "docs/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-docs-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run build
      - name: Commit built site to /docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs
          if git diff --cached --quiet; then
            echo "docs/ already up to date — nothing to commit."
          else
            git commit -m "chore: build site to /docs [skip ci]"
            git push
          fi
